plan-build-review:
  description: "Plan, implement, and review — the standard development cycle"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: builder
      prompt: "Implement the following plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation for bugs, style, and correctness:\n\n$INPUT"

plan-build:
  description: "Plan then build — fast two-step implementation without review"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: builder
      prompt: "Based on this plan, implement:\n\n$INPUT"

scout-flow:
  description: "Triple-scout deep recon — explore, validate, verify"
  steps:
    - agent: scout
      prompt: "Explore the codebase and investigate: $INPUT\n\nReport your findings with structure, key files, and patterns."
    - agent: scout
      prompt: "Validate and cross-check the following analysis. Look for anything missed, incorrect, or incomplete:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: scout
      prompt: "Final review pass. Verify the analysis below is accurate and complete. Add any missing details or corrections:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

plan-review-plan:
  description: "Iterative planning — plan, critique, then refine with feedback"
  steps:
    - agent: planner
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: plan-reviewer
      prompt: "Critically review this implementation plan. Challenge assumptions, find gaps, and suggest improvements:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: planner
      prompt: "Revise and improve your implementation plan based on this critique. Address every issue raised and incorporate the recommendations:\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

full-review:
  description: "End-to-end pipeline — scout, plan, build, and review"
  steps:
    - agent: scout
      prompt: "Explore the codebase and identify: $INPUT"
    - agent: planner
      prompt: "Based on this analysis, create a plan:\n\n$INPUT"
    - agent: builder
      prompt: "Implement this plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation:\n\n$INPUT"

research-plan-build:
  description: "Research external docs, then plan and build — for tasks requiring library knowledge"
  steps:
    - agent: librarian
      prompt: "Research external documentation and best practices for: $INPUT\n\nReturn key findings, relevant code examples, and any gotchas."
    - agent: planner
      prompt: "Based on this research, create an implementation plan for: $ORIGINAL\n\nResearch findings:\n$INPUT"
    - agent: builder
      prompt: "Implement the following plan:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: reviewer
      prompt: "Verify this implementation is correct and complete:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

scope-check-plan-build:
  description: "Check for ambiguities, clarify, then plan and build"
  steps:
    - agent: scope-check
      prompt: "Analyze this request for hidden complexity and ambiguities: $INPUT\n\nReturn a structured analysis with any blocking questions."
    - agent: planner
      prompt: "Create an implementation plan for: $ORIGINAL\n\nScope analysis to consider:\n$INPUT"
    - agent: builder
      prompt: "Implement the following plan:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

plan-review-build:
  description: "Plan, get plan reviewed for gaps, then build"
  steps:
    - agent: planner
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: plan-reviewer
      prompt: "Review this plan for gaps, ambiguities, and missing acceptance criteria:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: builder
      prompt: "Implement the following revised plan. Address all issues identified in the review:\n\nOriginal plan:\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: reviewer
      prompt: "Verify this implementation:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

advise-then-build:
  description: "Consult advisor for architecture guidance, then build"
  steps:
    - agent: advisor
      prompt: "Analyze and advise on the best architectural approach for: $INPUT\n\nProvide a clear recommendation with rationale."
    - agent: builder
      prompt: "Implement using the following architectural guidance:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: reviewer
      prompt: "Review this implementation for plan alignment and code quality:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

deep-plan:
  description: "Full planning pipeline — scout, research questions, draft plan, review for gaps"
  steps:
    - agent: scout
      prompt: "Explore the codebase thoroughly for context related to: $INPUT\n\nFind all relevant files, patterns, dependencies, and conventions. Report structured findings."
    - agent: planner
      prompt: "Research and analyze this request using the codebase findings below. Surface questions and gaps — do NOT write a plan.\n\nOriginal request: $ORIGINAL\n\nScout findings:\n$INPUT"
    - agent: plan-draft
      prompt: "Draft a structured implementation plan using all gathered context.\n\nOriginal request: $ORIGINAL\n\nResearch context and gap analysis:\n$INPUT"
    - agent: plan-reviewer
      prompt: "Review this plan for gaps, ambiguities, and missing acceptance criteria:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

swarm-full:
  description: "Swarm planning + worker execution + quality gate"
  steps:
    - agent: swarm-planner
      prompt: "Decompose this task into parallel subtasks for swarm execution: $INPUT\n\nReturn a CellTree JSON with no file overlap between subtasks."
    - agent: swarm-researcher
      prompt: "Research context needed for this task: $ORIGINAL\n\nSubtask plan:\n$INPUT\n\nReturn structured findings for worker agents."
    - agent: reviewer
      prompt: "Review the completed swarm work against original requirements:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
